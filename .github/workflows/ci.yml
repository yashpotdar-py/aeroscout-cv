name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: Python lint + type check ────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pyright

      - name: Lint with ruff
        working-directory: backend
        run: ruff check . --output-format=github

      - name: Check formatting with ruff
        working-directory: backend
        run: ruff format --check .

      - name: Type check with pyright
        working-directory: backend
        run: pyright --pythonversion 3.11 || true
        # `|| true` because pyright may flag the optional floodnav package;
        # this is informational, not a blocking failure for this showcase project.

  # ── Backend: Import smoke test ────────────────────────────────────────────────
  backend-smoke:
    name: Backend — Import Smoke Test
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps for OpenCV
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libsm6 libxrender1 libxext6 libgl1

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test — verify module imports
        working-directory: backend
        run: |
          python -c "
          import fastapi
          import uvicorn
          import pymavlink
          import pandas
          import numpy
          import scipy
          import cv2
          from PIL import Image
          print('All core imports OK')
          "

  # ── Frontend: TypeScript + ESLint ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend — TypeScript & ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --frozen-lockfile

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript compile check
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Frontend: Build verification ──────────────────────────────────────────────
  frontend-build:
    name: Frontend — Production Build
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --frozen-lockfile

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
